name: Build and Publish Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure (CMake)
        run: cmake -B build

      - name: Build (Release)
        run: cmake --build build --config Release

      - name: Verify expected DLLs exist
        shell: pwsh
        run: |
          $expected = @(
            "plugin/Box3DCore.dll",
            "plugin/Box3DSolverCHOP.dll",
            "plugin/Box3DBodySOP.dll",
            "plugin/Box3DBodiesCHOP.dll"
          )
          $missing = $expected | Where-Object { -not (Test-Path $_) }
          if ($missing.Count -gt 0) {
            Write-Error "Missing build outputs:`n$($missing -join "`n")"
          }

      - name: Package release artifacts
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          if ([string]::IsNullOrWhiteSpace($version) -or $version -eq "refs/heads/main") {
            $version = "manual-${{ github.run_number }}"
          }

          $packageRoot = "release/box3d-touchdesigner-$version-windows-x64"
          New-Item -ItemType Directory -Path $packageRoot -Force | Out-Null

          Copy-Item "plugin/*.dll" -Destination $packageRoot -Force
          Copy-Item "install_plugin.bat" -Destination $packageRoot -Force
          Copy-Item "README.md" -Destination $packageRoot -Force

          $zipPath = "release/box3d-touchdesigner-$version-windows-x64.zip"
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          Compress-Archive -Path "$packageRoot/*" -DestinationPath $zipPath

          $hash = (Get-FileHash $zipPath -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $(Split-Path $zipPath -Leaf)" | Set-Content "release/box3d-touchdesigner-$version-windows-x64.sha256"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/*.zip
            release/*.sha256
