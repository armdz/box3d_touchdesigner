name: Build and Publish Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure (CMake)
        run: cmake -B build

      - name: Build (Release)
        run: cmake --build build --config Release

      - name: Verify expected DLLs exist
        shell: pwsh
        run: |
          $expected = @(
            "plugin/Box3DCore.dll",
            "plugin/Box3DSolverCHOP.dll",
            "plugin/Box3DBodySOP.dll",
            "plugin/Box3DBodiesCHOP.dll",
            "plugin/Box3DContactsCHOP.dll",
            "plugin/Box3DForceCHOP.dll",
            "plugin/Box3DJointCHOP.dll",
            "plugin/Box3DSetJointSOP.dll",
            "plugin/Box3DDebugSOP.dll"
          )
          $missing = $expected | Where-Object { -not (Test-Path $_) }
          if ($missing.Count -gt 0) {
            Write-Error "Missing build outputs:`n$($missing -join "`n")"
          }

      - name: Package release artifacts
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          if ([string]::IsNullOrWhiteSpace($version) -or $version -eq "refs/heads/main") {
            $version = "manual-${{ github.run_number }}"
          }

          $packageRoot = "release/box3d-touchdesigner-$version-windows-x64"
          New-Item -ItemType Directory -Path $packageRoot -Force | Out-Null

          Copy-Item "plugin/*.dll" -Destination $packageRoot -Force
          Copy-Item "install_plugin.bat" -Destination $packageRoot -Force
          Copy-Item "README.md" -Destination $packageRoot -Force

          $zipPath = "release/box3d-touchdesigner-$version-windows-x64.zip"
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          Compress-Archive -Path "$packageRoot/*" -DestinationPath $zipPath

          $hash = (Get-FileHash $zipPath -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $(Split-Path $zipPath -Leaf)" | Set-Content "release/box3d-touchdesigner-$version-windows-x64.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-x64
          path: |
            release/*.zip
            release/*.sha256

  build-macos:
    # Apple Silicon runner; clang on it can still target x86_64 too, so we
    # build a universal binary usable on both Intel and Apple Silicon Macs.
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure (CMake, universal binary)
        run: cmake -B build -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"

      - name: Build (Release)
        run: cmake --build build --config Release

      - name: Verify expected bundles exist
        run: |
          expected=(
            "plugin/libBox3DCore.dylib"
            "plugin/Box3DSolverCHOP.plugin/Contents/MacOS/Box3DSolverCHOP"
            "plugin/Box3DBodySOP.plugin/Contents/MacOS/Box3DBodySOP"
            "plugin/Box3DBodiesCHOP.plugin/Contents/MacOS/Box3DBodiesCHOP"
            "plugin/Box3DContactsCHOP.plugin/Contents/MacOS/Box3DContactsCHOP"
            "plugin/Box3DForceCHOP.plugin/Contents/MacOS/Box3DForceCHOP"
            "plugin/Box3DJointCHOP.plugin/Contents/MacOS/Box3DJointCHOP"
            "plugin/Box3DSetJointSOP.plugin/Contents/MacOS/Box3DSetJointSOP"
            "plugin/Box3DDebugSOP.plugin/Contents/MacOS/Box3DDebugSOP"
          )
          missing=0
          for f in "${expected[@]}"; do
            if [ ! -e "$f" ]; then
              echo "::error::Missing build output: $f"
              missing=1
            fi
          done
          exit $missing

      - name: Package release artifacts
        run: |
          version="${{ github.ref_name }}"
          if [ -z "$version" ] || [ "$version" = "refs/heads/main" ]; then
            version="manual-${{ github.run_number }}"
          fi

          packageRoot="release/box3d-touchdesigner-$version-macos-universal"
          mkdir -p "$packageRoot"

          cp -R plugin/*.plugin "$packageRoot"/
          cp plugin/libBox3DCore.dylib "$packageRoot"/
          cp install_plugin.sh "$packageRoot"/
          cp README.md "$packageRoot"/

          zipName="box3d-touchdesigner-$version-macos-universal.zip"
          rm -f "release/$zipName"
          (cd "$packageRoot" && zip -r -X "$GITHUB_WORKSPACE/release/$zipName" . -x ".*")

          (cd release && shasum -a 256 "$zipName") > "release/box3d-touchdesigner-$version-macos-universal.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-universal
          path: |
            release/*.zip
            release/*.sha256

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/**/*.zip
            release/**/*.sha256
